name: "app"

services:
  rails-app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    depends_on:
      - rustfs
    volumes:
      - ../..:/workspaces:cached
    environment:
      LITESTREAM_REPLICA_KEY_ID: ${LITESTREAM_REPLICA_KEY_ID:-rustfsbackup}
      LITESTREAM_REPLICA_KEY_SECRET: ${LITESTREAM_REPLICA_KEY_SECRET:-rustfsbackup}
      LITESTREAM_REPLICA_BUCKET: ${LITESTREAM_REPLICA_BUCKET:-app-backup}
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
    ports:
      - "3000:3000"

  rustfs:
    image: rustfs/rustfs:latest
    security_opt:
    - "no-new-privileges:true"
    command: /data
    environment:
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_EXTERNAL_ADDRESS=:9000
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=rustfsbackup
      - RUSTFS_SECRET_KEY=rustfsbackup
      - RUSTFS_OBS_LOGGER_LEVEL=info
      - RUSTFS_TLS_PATH=/opt/tls
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    ports:
      - "9000:9000" # S3 API port
      - "9001:9001" # Console port

volumes:
  rustfs_data:
  rustfs_logs:
